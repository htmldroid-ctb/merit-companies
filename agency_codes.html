<html lang="en">
<head>
<meta charset="UTF-8">

<title>Merit Users — Agency Codes Directory</title>

<style>
  :root {
    --bg: #f5f7f3;
    --surface: #ffffff;
    --surface2: #eef3ed;
    --border: #dbe4da;
    --accent: #4f8a66;
    --accent-strong: #3e7353;
    --accent2: #6b8574;
    --text: #243127;
    --muted: #6f7f73;
    --danger: #c96b6b;
    --success: #4f8a66;
    --shadow: 0 10px 30px rgba(36, 49, 39, 0.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(180deg, #f8faf7 0%, #f3f6f1 100%);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 40px 48px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.86);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 18px;
  }

  .header-left .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }

  .header-left .eyebrow::before {
    content: '';
    display: inline-block;
    width: 20px;
    height: 1px;
    background: var(--accent);
  }

  .header-left h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1.05;
  }

  .header-left h1 span { color: var(--accent); }

  .header-stats { display: flex; gap: 18px; flex-wrap: wrap; }

  .stat {
    min-width: 140px;
    background: rgba(255,255,255,0.88);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 18px;
    box-shadow: var(--shadow);
  }

  .stat-num {
    font-size: 26px;
    font-weight: 700;
    color: var(--accent-strong);
    line-height: 1.1;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 4px;
  }

  .toolbar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(245,247,243,0.94);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 48px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 240px;
    max-width: 460px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  .search-wrap input,
  .filter-select,
  .form-group input,
  .form-group select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 14px 12px 16px;
    border-radius: 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    box-shadow: 0 1px 2px rgba(36, 49, 39, 0.03);
  }

  .search-wrap input { padding-left: 38px; }

  .search-wrap input:focus,
  .filter-select:focus,
  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(79, 138, 102, 0.12);
  }

  .search-wrap input::placeholder { color: #95a298; }

  .filter-select {
    width: auto;
    min-width: 130px;
    cursor: pointer;
  }

  .result-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  .btn-add,
  .btn-export,
  .btn-submit,
  .btn-confirm-yes,
  .btn-confirm-no {
    transition: transform 0.18s, box-shadow 0.18s, background 0.18s, border-color 0.18s, color 0.18s, opacity 0.18s;
  }

  .btn-add,
  .btn-export {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 11px 16px;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .btn-add {
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
    box-shadow: 0 8px 18px rgba(79, 138, 102, 0.16);
  }

  .btn-add:hover {
    background: var(--accent-strong);
    border-color: var(--accent-strong);
    transform: translateY(-1px);
  }

  .btn-export {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-export:hover {
    background: #f8fbf8;
    border-color: var(--accent2);
    transform: translateY(-1px);
  }

  .table-container {
    position: relative;
    z-index: 1;
    padding: 24px 48px 56px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  thead th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 14px 20px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: #f8faf7;
    z-index: 8;
    box-shadow: 0 1px 0 var(--border);
  }

  thead th:first-child { width: 50px; }
  thead th:nth-child(2) { width: 180px; }
  thead th:nth-child(3) { min-width: 240px; }
  thead th:nth-child(4) { width: 120px; }
  thead th:nth-child(5) { width: 100px; text-align: center; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s, transform 0.15s;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  tbody tr:hover { background: #f4f8f4; }

  tbody tr:last-child td { border-bottom: none; }

  tbody td {
    padding: 15px 20px;
    font-size: 14px;
    vertical-align: middle;
    line-height: 1.5;
    border-bottom: 1px solid #edf2ec;
  }

  .td-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    width: 50px;
    padding-right: 16px;
  }

  .code-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid #dde6dd;
    color: var(--accent-strong);
    padding: 5px 10px;
    border-radius: 999px;
    display: inline-block;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .agency-name {
    font-weight: 500;
    color: var(--text);
    word-break: break-word;
  }

  .type-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 9px;
    border-radius: 999px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
    border: 1px solid transparent;
    display: inline-block;
  }

  .type-1, .type-2, .type-3, .type-4, .type-5, .type-6 {
    background: #f0f5f0;
    color: var(--accent-strong);
    border-color: #dce7dd;
  }

  .td-actions { text-align: center; }

  .btn-row {
    background: #fff;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 5px 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    margin: 0 2px;
  }

  .btn-row:hover {
    border-color: #cdd9cd;
    color: var(--text);
    background: #f8fbf8;
  }

  .btn-row.edit:hover {
    border-color: var(--accent);
    color: var(--accent-strong);
  }

  .modal-overlay,
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(36, 49, 39, 0.24);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.open,
  .confirm-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal,
  .confirm-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 24px 48px rgba(36, 49, 39, 0.12);
  }

  .modal {
    padding: 32px;
    width: 100%;
    max-width: 500px;
    transform: translateY(18px) scale(0.98);
    transition: transform 0.25s;
    position: relative;
  }

  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal h2 {
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    color: var(--text);
  }

  .modal-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .modal-close {
    position: absolute;
    top: 18px; right: 18px;
    background: #fff;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 34px; height: 34px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
  }

  .modal-close:hover { border-color: #cfd8cf; color: var(--text); }

  .form-group { margin-bottom: 18px; }

  .form-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-group input.input-valid { border-color: var(--border) !important; }

  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    margin-top: 8px;
    box-shadow: 0 10px 18px rgba(79, 138, 102, 0.18);
  }

  .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-submit:not(:disabled):hover { background: var(--accent-strong); }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 14px 18px;
    border-radius: 14px;
    z-index: 200;
    opacity: 0;
    transform: translateY(16px);
    transition: all 0.3s;
    pointer-events: none;
    box-shadow: 0 14px 26px rgba(36, 49, 39, 0.12);
  }

  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: #e7f4eb; color: #295239; }
  .toast.error { background: #f9e7e7; color: #8d3c3c; }
  .toast.info { background: #e8f0ea; color: #355443; }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-state svg { margin-bottom: 16px; opacity: 0.45; }
  .empty-state p { font-family: 'DM Sans', sans-serif; font-size: 14px; }

  .confirm-box {
    padding: 28px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }

  .confirm-box p {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 22px;
    line-height: 1.6;
  }

  .confirm-box strong { color: var(--accent-strong); }

  .confirm-actions { display: flex; gap: 12px; justify-content: center; }

  .btn-confirm-yes {
    background: #cc7474;
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }

  .btn-confirm-yes:hover { opacity: 0.9; }

  .btn-confirm-no {
    background: #fff;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 24px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }

  .btn-confirm-no:hover { background: #f8fbf8; }

  @media (max-width: 768px) {
    header, .toolbar, .table-container { padding-left: 18px; padding-right: 18px; }
    .header-stats { width: 100%; }
    .stat { flex: 1 1 140px; }
    .form-row { grid-template-columns: 1fr; }
    .modal { padding: 24px 18px; margin: 18px; }
    table { border-radius: 14px; }
  }
</style>

</head>
<body>

<header>
  <div class="header-left">
    <div class="eyebrow">Merit Users System</div>
    <h1>Agency <span>Codes</span><br>Directory</h1>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="totalCount">—</div>
      <div class="stat-label">Total Agencies</div>
    </div>
    <!-- FIX #11: typeCount now computed dynamically by JS -->
    <div class="stat">
      <div class="stat-num" id="typeCount">—</div>
      <div class="stat-label">Code Types</div>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search agency name or code…">
  </div>
  <select class="filter-select" id="typeFilter">
    <option value="">All Types</option>
    <option value="1">Type 1</option>
    <option value="2">Type 2</option>
    <option value="3">Type 3</option>
    <option value="4">Type 4</option>
    <option value="5">Type 5</option>
    <option value="6">Type 6</option>
  </select>
  <span class="result-count" id="resultCount"></span>
  <!-- FIX #3: Export button -->
  <button class="btn-export" onclick="exportData()">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v8M3.5 6l3 3 3-3M1 10.5h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Export
  </button>
  <button class="btn-add" onclick="openModal()">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    Add Agency
  </button>
</div>

<div class="table-container">
  <table id="agencyTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Code</th>
        <th>Agency Name</th>
        <th>Type</th>
        <!-- FIX #13: Actions column -->
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none;">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="22" stroke="#5a6a8a" stroke-width="2"/><path d="M16 24h16M24 16v16" stroke="#5a6a8a" stroke-width="2" stroke-linecap="round"/></svg>
    <p>No agencies match your search.</p>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Add Agency</h2>
    <p class="modal-sub" id="modalSub">New directory entry</p>
    <div class="form-row">
      <div class="form-group">
        <label>Type Prefix</label>
        <!-- FIX #4: newType is reset in closeModal() -->
        <select id="newType">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
        </select>
      </div>
      <div class="form-group">
        <label>Code Number</label>
        <!-- FIX #8: step="1" prevents decimals -->
        <input type="number" id="newCodeNum" placeholder="e.g. 320" min="1" step="1">
      </div>
    </div>
    <div class="form-group">
      <label>Agency Name</label>
      <input type="text" id="newAgencyName" placeholder="e.g. Acme Recruitment Ltd">
    </div>
    <!-- FIX #10: button is disabled while submitting -->
    <button class="btn-submit" id="submitBtn" onclick="submitAgency()">Add to Directory</button>
  </div>
</div>

<!-- FIX #13: Confirm delete dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p>Delete <strong id="confirmName"></strong>?<br>This cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn-confirm-yes" onclick="confirmDelete()">Delete</button>
      <button class="btn-confirm-no" onclick="cancelDelete()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ─────────────────────────────────────────────
// FIX #1 & #14: Immutable source, mutable working copy
// Load from localStorage if available (FIX #1: persistence)
// ─────────────────────────────────────────────
const STORAGE_KEY = 'agencyDirectory_v1';

function loadFromStorage() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch (e) { /* ignore */ }
  return null;
}

function saveToStorage(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) { /* ignore */ }
}

// Deduplicate raw data
const seen = new Set();
const baseAgencies = rawData.filter(([code, name]) => {
  const key = code + '|' + name;
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
}).map(([code, name], i) => ({ id: i + 1, code, name }));

// FIX #1: Use persisted data if it exists, otherwise use base
let agencies = loadFromStorage() || baseAgencies.map(a => ({ ...a }));

let filtered = [];
let editingId = null;     // FIX #13: track edit mode
let deleteTargetId = null; // FIX #13: track delete target
let isSubmitting = false;  // FIX #10: debounce guard

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function getType(code) {
  return code.split('*')[0];
}

// FIX #6: Sanitise strings before inserting into DOM
function escapeHTML(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

// FIX #11: Compute unique type count dynamically
function updateStats() {
  document.getElementById('totalCount').textContent = agencies.length;
  const types = new Set(agencies.map(a => getType(a.code)));
  document.getElementById('typeCount').textContent = types.size;
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('resultCount').textContent = '0 results';
    return;
  }

  empty.style.display = 'none';
  document.getElementById('resultCount').textContent = `${filtered.length} of ${agencies.length}`;

  tbody.innerHTML = filtered.map((a, idx) => {
    const type = getType(a.code);
    // FIX #6: escapeHTML used on both name and code
    return `<tr style="animation-delay:${Math.min(idx * 12, 300)}ms">
      <td class="td-num">${idx + 1}</td>
      <td><span class="code-badge">${escapeHTML(a.code)}</span></td>
      <td class="agency-name">${escapeHTML(a.name)}</td>
      <td><span class="type-badge type-${escapeHTML(type)}">Type ${escapeHTML(type)}</span></td>
      <td class="td-actions">
        <button class="btn-row edit" onclick="openEditModal(${a.id})" title="Edit">✎</button>
        <button class="btn-row" onclick="promptDelete(${a.id})" title="Delete">✕</button>
      </td>
    </tr>`;
  }).join('');
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const type = document.getElementById('typeFilter').value;

  filtered = agencies.filter(a => {
    const matchSearch = !search || a.name.toLowerCase().includes(search) || a.code.toLowerCase().includes(search);
    const matchType = !type || getType(a.code) === type;
    return matchSearch && matchType;
  });
  render();
}

// ─────────────────────────────────────────────
// MODAL OPEN / CLOSE
// ─────────────────────────────────────────────
function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add Agency';
  document.getElementById('modalSub').textContent = 'New directory entry';
  document.getElementById('submitBtn').textContent = 'Add to Directory';
  resetForm();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('newAgencyName').focus(), 250);
}

// FIX #13: Edit mode
function openEditModal(id) {
  const agency = agencies.find(a => a.id === id);
  if (!agency) return;
  editingId = id;

  const parts = agency.code.split('*');
  document.getElementById('newType').value = parts[0];
  document.getElementById('newCodeNum').value = parts[1];
  document.getElementById('newAgencyName').value = agency.name;

  document.getElementById('modalTitle').textContent = 'Edit Agency';
  document.getElementById('modalSub').textContent = 'Update directory entry';
  document.getElementById('submitBtn').textContent = 'Save Changes';

  // FIX #9: clear any red borders
  clearFieldErrors();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('newAgencyName').focus(), 250);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  resetForm();
  editingId = null;
}

// FIX #4 & #9: Full form reset including type select and border colours
function resetForm() {
  document.getElementById('newCodeNum').value = '';
  document.getElementById('newAgencyName').value = '';
  document.getElementById('newType').value = '2';
  clearFieldErrors();
}

function clearFieldErrors() {
  document.getElementById('newCodeNum').style.borderColor = '';
  document.getElementById('newAgencyName').style.borderColor = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ─────────────────────────────────────────────
// ADD / EDIT SUBMIT — FIX #2, #5, #7, #8, #10
// ─────────────────────────────────────────────
function submitAgency() {
  // FIX #10: prevent rapid double-submit
  if (isSubmitting) return;

  const type = document.getElementById('newType').value;
  const numRaw = document.getElementById('newCodeNum').value.trim();
  const name = document.getElementById('newAgencyName').value.trim();

  // FIX #9: reset borders before re-validating
  clearFieldErrors();

  let valid = true;

  // FIX #7: reject 0 and negatives; FIX #8: reject non-integers
  const numInt = parseInt(numRaw, 10);
  if (!numRaw || isNaN(numInt) || numInt < 1 || String(numInt) !== numRaw) {
    document.getElementById('newCodeNum').style.borderColor = 'var(--danger)';
    valid = false;
  }

  if (!name) {
    document.getElementById('newAgencyName').style.borderColor = 'var(--danger)';
    valid = false;
  }

  if (!valid) return;

  const newCode = `${type}*${numInt}`;

  // FIX #2 & #5: duplicate code+name check
  const dupCode = agencies.find(a => a.code === newCode && a.id !== editingId);
  if (dupCode) {
    document.getElementById('newCodeNum').style.borderColor = 'var(--danger)';
    showToast(`Code ${newCode} already belongs to "${dupCode.name}"`, 'error');
    return;
  }

  const dupName = agencies.find(a =>
    a.name.toLowerCase() === name.toLowerCase() && a.id !== editingId
  );
  if (dupName) {
    document.getElementById('newAgencyName').style.borderColor = 'var(--danger)';
    showToast(`"${name}" already exists in the directory`, 'error');
    return;
  }

  // FIX #10: disable button while processing
  isSubmitting = true;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;

  if (editingId !== null) {
    // Edit existing
    const idx = agencies.findIndex(a => a.id === editingId);
    if (idx !== -1) {
      agencies[idx].code = newCode;
      agencies[idx].name = name;
    }
    showToast('✓ Agency updated', 'success');
  } else {
    // Add new
    agencies.unshift({ id: Date.now(), code: newCode, name });
    showToast('✓ Agency added successfully', 'success');
  }

  // FIX #1: persist to localStorage
  saveToStorage(agencies);
  updateStats();
  closeModal();
  applyFilters();

  setTimeout(() => {
    isSubmitting = false;
    btn.disabled = false;
  }, 400);
}

// ─────────────────────────────────────────────
// DELETE — FIX #13
// ─────────────────────────────────────────────
function promptDelete(id) {
  const agency = agencies.find(a => a.id === id);
  if (!agency) return;
  deleteTargetId = id;
  document.getElementById('confirmName').textContent = agency.name;
  document.getElementById('confirmOverlay').classList.add('open');
}

function confirmDelete() {
  agencies = agencies.filter(a => a.id !== deleteTargetId);
  saveToStorage(agencies); // FIX #1
  updateStats();
  applyFilters();
  showToast('Agency removed', 'info');
  cancelDelete();
}

function cancelDelete() {
  deleteTargetId = null;
  document.getElementById('confirmOverlay').classList.remove('open');
}

// ─────────────────────────────────────────────
// FIX #3: EXPORT
// ─────────────────────────────────────────────
function exportData() {
  const rows = [['Code', 'Agency Name', 'Type']];
  agencies.forEach(a => rows.push([a.code, a.name, `Type ${getType(a.code)}`]));
  const csv = rows.map(r => r.map(c => `"${c.replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `agency_codes_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  URL.revokeObjectURL(url);
  showToast('✓ Exported as CSV', 'success');
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ─────────────────────────────────────────────
// FIX #12: thead offset — robust multi-pass calculation
// Uses getBoundingClientRect (sub-pixel accurate), double-rAF to
// wait for full paint, ResizeObserver for live updates, and
// document.fonts.ready for after-font-load correction.
// ─────────────────────────────────────────────
function setTheadOffset() {
  const toolbar = document.querySelector('.toolbar');
  const toolbarHeight = toolbar ? Math.ceil(toolbar.getBoundingClientRect().height) : 68;
  const safeGap = 8;
  document.documentElement.style.setProperty('--thead-top', `${toolbarHeight + safeGap}px`);
}

setTheadOffset();
requestAnimationFrame(() => requestAnimationFrame(setTheadOffset));

if (window.ResizeObserver) {
  new ResizeObserver(setTheadOffset).observe(document.querySelector('.toolbar'));
}

window.addEventListener('resize', setTheadOffset);

if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => requestAnimationFrame(setTheadOffset));
}

// ─────────────────────────────────────────────
// KEYBOARD SHORTCUTS
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    cancelDelete();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('typeFilter').addEventListener('change', applyFilters);

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
updateStats();
applyFilters();
</script>
